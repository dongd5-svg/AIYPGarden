<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ants In Your Plants Interactive Garden</title>
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Login Gate -->
<div id="loginGate">
  <div class="login-box">
    <h2>Ants In Your Plants</h2>
    <p>Sign in to access the garden</p>
    <button id="googleBtn">Sign in with Google</button>
  </div>
</div>

<header>
  <div>Ants In Your Plants Interactive Garden</div>
  <div style="display:flex;align-items:center;gap:1rem;">
    <span id="userNameDisplay" style="font-size:1rem;color:white;"></span>
    <div class="profile-image-container">
      <img src="" alt="Profile" class="profile-image" />
    </div>
    <button id="signOutBtn" style="display:none;background:#fff2;color:white;border:1px solid white;padding:0.3rem 0.8rem;border-radius:0.5rem;cursor:pointer;font-family:inherit;">Sign Out</button>
  </div>
</header>

<main>
  <!-- Garden grid -->
  <div class="garden-col">
    <div id="garden-container" aria-label="garden grid"></div>
  </div>

  <!-- Desktop side panel -->
  <div class="panel-col">
    <section id="info-panel">
      <div id="defaultInfo">
        <h2>Welcome to the Garden</h2>
        <p>Select a plot on the left to view or edit its details. Tiles stay blank until you add a title.</p>
      </div>

      <div id="editInfo" style="display:none">
        <h2 id="plotTitle">Plot</h2>

        <div class="field">
          <label for="titleInput">Title</label>
          <input id="titleInput" type="text" placeholder="e.g. Tomato Bed" />
        </div>
        <div class="field">
          <label for="descInput">Description</label>
          <textarea id="descInput" rows="6" placeholder="Notes about this plot"></textarea>
        </div>
        <div class="field">
          <label for="imgInput">Image URL (optional)</label>
          <input id="imgInput" type="text" placeholder="https://..." />
        </div>
        <div class="field">
          <label for="colorInput">Tile color</label>
          <input id="colorInput" type="color" value="#e8ffd6" />
        </div>
        <div class="controls">
          <button class="btn" id="saveBtn">Save</button>
          <button class="btn" id="clearBtn">Clear</button>
          <button class="btn" id="exitBtn">Exit</button>
        </div>
      </div>
    </section>
  </div>
</main>

<!-- Mobile modal popup -->
<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-handle"></div>
    <h2 id="modal-plotTitle">Plot</h2>

    <div class="field">
      <label for="modal-titleInput">Title</label>
      <input id="modal-titleInput" type="text" placeholder="e.g. Tomato Bed" />
    </div>
    <div class="field">
      <label for="modal-descInput">Description</label>
      <textarea id="modal-descInput" rows="5" placeholder="Notes about this plot"></textarea>
    </div>
    <div class="field">
      <label for="modal-imgInput">Image URL (optional)</label>
      <input id="modal-imgInput" type="text" placeholder="https://..." />
    </div>
    <div class="field">
      <label for="modal-colorInput">Tile color</label>
      <input id="modal-colorInput" type="color" value="#e8ffd6" />
    </div>
    <div class="controls">
      <button class="btn" id="modal-saveBtn">Save</button>
      <button class="btn" id="modal-clearBtn">Clear</button>
      <button class="btn" id="modal-exitBtn">Exit</button>
    </div>
  </div>
</div>

</html>
